<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=240, height=320, initial-scale=1, maximum-scale=1, user-scalable=no" />
  <title>TicTacToe CloudPhone</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div id="app">
    <header id="topbar">
      <div id="status">New game</div>
      <div id="controls">
        <select id="mode">
          <option value="single">Vs Computer</option>
          <option value="local">Local Multiplayer</option>
        </select>
        <select id="gridSize">
          <option value="3" selected>3 × 3</option>
          <option value="4">4 × 4</option>
          <option value="5">5 × 5</option>
        </select>
        <select id="difficulty">
          <option value="1">Easy</option>
          <option value="3" selected>Normal</option>
          <option value="6">Hard</option>
        </select>
        <button id="newBtn">New</button>
      </div>
    </header>

    <main>
      <div id="board"></div>
    </main>

    <footer id="footer">
      <div id="score">X: 0  O: 0  Draws: 0</div>
    </footer>
  </div>
  <script src="app.js"></script>
</body>
</html>
